services:
  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-root}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-rootroot}"
    command: [
      "server",
      "/data",
      "--console-address",
      ":9001"
    ]
    volumes:
      - minio-data:/data
    networks:
      common:
        aliases:
          - minio

  object-storage-maintenance:
    build:
      context: ./
      dockerfile: Containerfile
    image: object-storage-maintenance
    environment:
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      S3_REGION: "${S3_REGION}"
      AWS_ENDPOINT_URL_S3: "${AWS_ENDPOINT_URL_S3:-http://minio:9000}"
    command: [
      "archive",
      "--src-bucket", "${OBJECT_STORAGE_BUCKET:-test}",
      "--src-prefix", "${SRC_PREFIX:-audit/}",
      "--dst-bucket", "${OBJECT_STORAGE_BUCKET:-test}",
      "--dst-prefix", "${DST_PREFIX:-.archive/}",
    ]
    depends_on:
      minio:
        condition: service_started

networks:
  common:
    driver: bridge

volumes:
  minio-data: