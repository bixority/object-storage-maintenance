[package]
name = "object-storage-maintenance"
version = "0.0.2"
edition = "2021"

[dependencies]
aws-sdk-s3 = { version = "1.71.0", features = ["behavior-version-latest"] }
aws-types = "1.3.4"
tokio = { version = "1.43.0", features = ["rt", "rt-multi-thread", "macros"] }
chrono = "0.4.39"
clap = { version = "4.5.27", features = ["derive"] }
async-channel = "2.3.1"
tokio-stream = "0.1.17"
tokio-util = "0.7.13"
zip = "2.2.2"

