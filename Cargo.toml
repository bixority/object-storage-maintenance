[package]
name = "object-storage-maintenance"
version = "0.2.34"
edition = "2024"

[dependencies]
async-compression = { version = "0.4.41", features = ["tokio", "xz"] }
aws-sdk-s3 = { version = "1.129.0", features = ["behavior-version-latest", "rt-tokio", "http-1x", "rustls"] }
aws-types = "1.3.15"
chrono = "0.4.44"
clap = { version = "4.6.1", features = ["derive"] }
futures = "0.3.32"
mimalloc = { version = "0.1.48", features = ["extended"] }
tokio = { version = "1.52.0", features = ["rt", "rt-multi-thread", "macros"] }
tokio-tar = "0.3.1"

[profile.release]
opt-level = 3
debug = false
strip = true
lto = "fat"
codegen-units = 1
